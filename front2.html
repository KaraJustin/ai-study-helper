<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 学习助手</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card: rgba(255, 255, 255, 0.72);
      --text: #1d1d1f;
      --subtext: #6e6e73;
      --border: rgba(0, 0, 0, 0.08);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      --blue: #0071e3;
      --blue-hover: #0077ed;
      --button-text: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0, 113, 227, 0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(255, 45, 85, 0.06), transparent 24%),
        linear-gradient(180deg, #fbfbfd 0%, #f5f5f7 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 56px 20px 80px;
    }

    .hero {
      text-align: center;
      margin-bottom: 36px;
    }

    .eyebrow {
      color: var(--blue);
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    .title {
      font-size: clamp(40px, 7vw, 72px);
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0 0 14px;
    }

    .subtitle {
      max-width: 720px;
      margin: 0 auto;
      font-size: clamp(18px, 2.3vw, 24px);
      line-height: 1.45;
      color: var(--subtext);
      letter-spacing: -0.01em;
    }

    .panel {
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .input-label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text);
    }

    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border: 1px solid rgba(0, 0, 0, 0.08);
      outline: none;
      border-radius: 22px;
      padding: 18px 20px;
      font-size: 17px;
      line-height: 1.6;
      color: var(--text);
      background: rgba(255, 255, 255, 0.78);
      transition: all 0.25s ease;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    textarea:focus {
      border-color: rgba(0, 113, 227, 0.35);
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.10);
      background: rgba(255, 255, 255, 0.92);
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .primary {
      background: var(--blue);
      color: var(--button-text);
      box-shadow: 0 10px 24px rgba(0, 113, 227, 0.22);
    }

    .primary:hover {
      background: var(--blue-hover);
      transform: translateY(-1px);
    }

    .secondary {
      background: rgba(255, 255, 255, 0.75);
      color: var(--text);
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    .secondary:hover {
      background: rgba(255, 255, 255, 0.95);
      transform: translateY(-1px);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 18px;
      font-size: 14px;
      color: var(--subtext);
    }

    .result-wrap {
      margin-top: 24px;
    }

    .result-title {
      font-size: 20px;
      font-weight: 650;
      letter-spacing: -0.02em;
      margin: 0 0 14px;
    }

    .result-box {
      min-height: 220px;
      white-space: pre-wrap;
      border-radius: 24px;
      padding: 22px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(0, 0, 0, 0.08);
      color: var(--text);
      font-size: 17px;
      line-height: 1.75;
      box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.45);
    }

    .loading {
      color: var(--blue);
    }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      color: var(--subtext);
      font-size: 13px;
    }

    @media (max-width: 640px) {
      .page {
        padding-top: 36px;
      }

      .panel {
        padding: 20px;
        border-radius: 24px;
      }

      textarea {
        min-height: 150px;
        font-size: 16px;
      }

      .result-box {
        min-height: 180px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="eyebrow">AI Study Assistant</div>
      <h1 class="title">你的学习想法，交给 AI 整理。</h1>
      <p class="subtitle">
        用更轻的方式生成学习计划、拆分任务，或者在低落时得到一句恰到好处的鼓励。
      </p>
    </section>

    <section class="panel">
      <label class="input-label" for="userInput">输入你的学习需求</label>
      <textarea
        id="userInput"
        placeholder="比如：我今天要复习高代和英语，还想写一点 Python，希望安排得清楚一点。"
      ></textarea>

      <div class="button-row">
        <button id="btn-plan" class="primary" onclick="callApi('plan')">生成学习计划</button>
        <button id="btn-split_task" class="secondary" onclick="callApi('split_task')">拆分任务</button>
        <button id="btn-encourage" class="secondary" onclick="callApi('encourage')">鼓励一下</button>
      </div>

      <div class="meta">
        <div>后端地址：<span id="backendText">http://127.0.0.1:8000</span></div>
        <div id="statusText">状态：等待输入</div>
      </div>

      <div class="result-wrap">
        <h2 class="result-title">结果</h2>
        <div id="result" class="result-box">生成结果会显示在这里。</div>
      </div>
    </section>

    <div class="footer-note">
      基于你的 FastAPI 后端接口：/plan、/split_task、/encourage
    </div>
  </div>

  <script>
    const BASE_URL = "http://127.0.0.1:8000";

    function setActiveButton(endpoint) {
      const buttons = ["plan", "split_task", "encourage"];

      buttons.forEach((name) => {
        const btn = document.getElementById(`btn-${name}`);
        if (!btn) return;

        if (name === endpoint) {
          btn.classList.remove("secondary");
          btn.classList.add("primary");
        } else {
          btn.classList.remove("primary");
          btn.classList.add("secondary");
        }
      });
    }

    async function callApi(endpoint) {
      const resultBox = document.getElementById("result");
      const statusText = document.getElementById("statusText");
      setActiveButton(endpoint);

      const userInput = document.getElementById("userInput").value.trim();

      if (!userInput) {
        resultBox.textContent = "请输入内容。";
        statusText.textContent = "状态：输入为空";
        return;
      }

      resultBox.innerHTML = '<span class="loading">正在生成，请稍等…</span>';
      statusText.textContent = `状态：正在调用 /${endpoint}`;

      try {
        const url = `${BASE_URL}/${endpoint}?user_input=${encodeURIComponent(userInput)}`;
        const response = await fetch(url);
        const data = await response.json();

        if (data.ok) {
          resultBox.textContent = data.data.ai_answer;
          statusText.textContent = "状态：生成成功";
        } else {
          resultBox.textContent = `错误：${data.error}`;
          statusText.textContent = "状态：请求失败";
        }
      } catch (error) {
        resultBox.textContent = `请求失败：${error}`;
        statusText.textContent = "状态：网络异常";
      }
    }
  </script>
</body>
</html>
